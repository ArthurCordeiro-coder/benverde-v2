<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benverde — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0b1410;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* ── Phone shell ── */
  .phone-shell {
    width: 390px;
    height: 844px;
    background: #070d09;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 0 10px #0f1a12,
      0 0 0 11px rgba(255,255,255,0.08),
      0 40px 80px rgba(0,0,0,0.7),
      0 0 60px rgba(16,185,129,0.08);
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Scrollbar hide */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Screen transitions */
  .screen-enter {
    animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .screen-enter-back {
    animation: slideInBack 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes slideInBack {
    from { transform: translateX(-30%); opacity: 0.5; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); } to { transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Typing dots */
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Desktop hint */
  .desktop-hint {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 7px 16px;
    color: rgba(255,255,255,0.4);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Global input placeholder */
  input::placeholder { color: rgba(100,116,139,0.7); }
  input { caret-color: #4ade80; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="dynamic-island"></div>
  <div id="root" style="height:100%;"></div>
</div>

<div class="desktop-hint">Protótipo interativo — navegue pelas telas</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mobile/components.jsx"></script>
<script type="text/babel" src="mobile/screens-home-estoque.jsx"></script>
<script type="text/babel" src="mobile/screens-precos-lojas.jsx"></script>
<script type="text/babel" src="mobile/screens-mita.jsx"></script>

<script type="text/babel">
const { useState } = React;

// ─── ROUTER / APP SHELL ────────────────────────────────────

function App() {
  // screen: 'home' | 'estoque' | 'precos' | 'lojas' | 'loja-detalhe' | 'mita'
  const [screen, setScreen] = useState('home');
  const [selectedLoja, setSelectedLoja] = useState(0);
  const [direction, setDirection] = useState('forward');

  function navTo(s, dir = 'forward') {
    setDirection(dir);
    setScreen(s);
  }

  function handleNav(tab) {
    const tabScreens = { home: 'home', estoque: 'estoque', precos: 'precos', lojas: 'lojas', mita: 'mita' };
    navTo(tabScreens[tab] || tab, 'forward');
  }

  function handleSelectLoja(idx) {
    setSelectedLoja(idx);
    navTo('loja-detalhe', 'forward');
  }

  const animClass = direction === 'forward' ? 'screen-enter' : 'screen-enter-back';

  const screenEl = (() => {
    switch (screen) {
      case 'home':
        return <ScreenHome
          onNav={handleNav}
          onGoEstoque={() => navTo('estoque')}
          onGoLojas={() => navTo('lojas')}
          onGoMita={() => navTo('mita')}
        />;
      case 'estoque':
        return <ScreenEstoque onBack={() => navTo('home', 'back')} onNav={handleNav} />;
      case 'precos':
        return <ScreenPrecos onBack={() => navTo('home', 'back')} onNav={handleNav} />;
      case 'lojas':
        return <ScreenLojas onBack={() => navTo('home', 'back')} onNav={handleNav} onSelectLoja={handleSelectLoja} />;
      case 'loja-detalhe':
        return <ScreenLojaDetalhe lojaIndex={selectedLoja} onBack={() => navTo('lojas', 'back')} onNav={handleNav} />;
      case 'mita':
        return <ScreenMita onBack={() => navTo('home', 'back')} onNav={handleNav} />;
      default:
        return null;
    }
  })();

  return (
    <div style={{ height: '100%', position: 'relative', overflow: 'hidden', background: '#070d09' }}>
      <div key={screen} className={animClass} style={{ height: '100%' }}>
        {screenEl}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
